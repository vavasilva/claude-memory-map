<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Memory Map — memórias do Claude Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: oklch(0.185 0.006 265);
    --surface: oklch(0.225 0.008 265);
    --surface-2: oklch(0.245 0.008 265);
    --border: oklch(0.32 0.01 265);
    --text: oklch(0.95 0.006 265);
    --text-2: oklch(0.74 0.008 265);
    --text-3: oklch(0.56 0.008 265);
    --mono-bg: oklch(0.275 0.01 265);
  }
  [data-theme="light"]{
    --bg: oklch(0.99 0.004 95);
    --surface: #ffffff;
    --surface-2: oklch(0.972 0.004 95);
    --border: oklch(0.91 0.004 260);
    --text: oklch(0.26 0.012 260);
    --text-2: oklch(0.5 0.01 260);
    --text-3: oklch(0.64 0.008 260);
    --mono-bg: oklch(0.965 0.005 260);
  }
  /* cor por fonte (--bc) — default escuro, override no claro */
  .b0{--bc: oklch(0.75 0.13 300);}
  .b1{--bc: oklch(0.75 0.13 255);}
  .b2{--bc: oklch(0.77 0.12 50);}
  [data-theme="light"] .b0{--bc: oklch(0.6 0.13 300);}
  [data-theme="light"] .b1{--bc: oklch(0.6 0.13 255);}
  [data-theme="light"] .b2{--bc: oklch(0.63 0.13 45);}

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Geist", system-ui, -apple-system, sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"Geist Mono", ui-monospace, monospace;}

  /* ---- Toolbar ---- */
  .toolbar{
    display:flex; justify-content:space-between; align-items:center; gap:24px;
    padding:16px 30px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:10;
  }
  .wordmark{display:flex; align-items:center; gap:9px;}
  .wordmark .dot{width:9px; height:9px; border-radius:50%; background:var(--text);}
  .wordmark .name{font-family:"Geist Mono",monospace; font-weight:600; font-size:15px; letter-spacing:-0.01em;}
  .wordmark .sub{font-size:13px; color:var(--text-3);}

  .segmented{display:flex; gap:5px; padding:4px; background:var(--surface-2);
    border:1px solid var(--border); border-radius:11px; flex-wrap:wrap; max-width:60vw; justify-content:center;}
  .segmented button{
    font-family:"Geist Mono",monospace; font-size:12.5px; padding:7px 13px;
    border:none; border-radius:8px; cursor:pointer; background:transparent; color:var(--text-3);
    transition:background .15s, color .15s; display:flex; gap:7px; align-items:center;
  }
  .segmented button .ct{font-size:11px; opacity:.6;}
  .segmented button.active{background:var(--surface); color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,.1);}

  .theme-toggle{
    border:1px solid var(--border); background:var(--surface); color:var(--text-2);
    font-family:"Geist",sans-serif; font-size:12.5px; padding:7px 13px; border-radius:9px; cursor:pointer; white-space:nowrap;
  }
  .tools{display:flex; align-items:center; gap:10px; position:relative;}
  #search{font-family:"Geist",sans-serif; font-size:12.5px; padding:7px 12px; border-radius:9px;
    border:1px solid var(--border); background:var(--surface); color:var(--text); width:170px; outline:none;}
  #search:focus{border-color:var(--text-3);}
  /* ---- Resultados da busca (dropdown clicável) ---- */
  #results{position:absolute; top:calc(100% + 7px); right:0; width:340px; max-width:80vw; max-height:54vh;
    overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:4px;
    box-shadow:0 10px 30px rgba(0,0,0,.34); z-index:60;}
  #results .rhead{padding:6px 10px 4px; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-3);}
  .result{display:flex; gap:9px; align-items:flex-start; padding:7px 10px; border-radius:8px; cursor:pointer;}
  .result:hover{background:color-mix(in oklab, var(--bc) 15%, var(--surface));}
  .result.sel{background:color-mix(in oklab, var(--bc) 24%, var(--surface)); outline:1.5px solid var(--bc); outline-offset:-1px;}
  .result .dot{width:8px; height:8px; border-radius:50%; background:var(--bc); margin-top:4px; flex:none;}
  .result .rtext{font-size:12.5px; line-height:1.35; color:var(--text); overflow:hidden;}
  .result .rtopic{font-size:11px; color:var(--text-3); margin-top:2px;}
  .live{font-size:10.5px; color:var(--text-3); display:inline-flex; align-items:center; gap:5px; margin-left:4px;}
  .live::before{content:""; width:7px; height:7px; border-radius:50%; background:var(--text-3); transition:background .2s, box-shadow .2s;}
  .live.on::before{background:oklch(0.72 0.17 145); box-shadow:0 0 0 4px color-mix(in oklab, oklch(0.72 0.17 145) 25%, transparent);}

  /* ---- Legend ---- */
  .legend{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:11px 30px; background:var(--surface-2); border-bottom:1px solid var(--border);
  }
  .legend .lbl{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; font-weight:600; color:var(--text-3);}
  .chip{
    display:flex; gap:9px; align-items:center; padding:6px 12px; border-radius:10px;
    border:1px solid var(--border); background:var(--surface); cursor:default;
  }
  .chip .dot{width:9px; height:9px; border-radius:50%; background:var(--bc);}
  .chip .file{font-family:"Geist Mono",monospace; font-size:12px; color:var(--text);}
  .chip .role{font-size:11.5px; color:var(--text-3);}
  .chip .badge{font-family:"Geist Mono",monospace; font-size:11px; color:var(--text-3);
    background:var(--surface-2); padding:1px 7px; border-radius:999px;}
  .chip .badge.tok{color:var(--bc); background:color-mix(in oklab, var(--bc) 14%, var(--surface-2));}
  .legend .hint{margin-left:auto; font-size:12px; color:var(--text-3);}

  /* ---- Map ---- */
  .mapwrap{flex:1; overflow:auto; display:flex; justify-content:center; padding:24px;}
  .canvas{
    position:relative; border-radius:16px;
    background:radial-gradient(ellipse 60% 55% at 50% 50%, color-mix(in oklab, var(--text) 4%, var(--bg)), var(--bg) 70%);
    flex:0 0 auto;
  }
  .conns{position:absolute; top:0; left:0; z-index:1; pointer-events:none;}
  .conns path{stroke:var(--bc); stroke-width:2; stroke-linecap:round; fill:none;}

  .node{position:absolute; z-index:2;}
  .root{z-index:3; transform:translate(-50%,-50%);
    background:var(--text); color:var(--bg); padding:15px 24px; border-radius:16px;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.2);
    display:flex; flex-direction:column; align-items:center; gap:2px; text-align:center;}
  .root .dir{font-family:"Geist Mono",monospace; font-size:10.5px; opacity:.55;}
  .root .pname{font-weight:600; font-size:17px; letter-spacing:-0.01em;}
  .root .psub{font-size:11.5px; opacity:.6;}

  .topic{transform:translate(-50%,-50%); cursor:pointer; white-space:nowrap;
    background:color-mix(in oklab, var(--bc) 13%, var(--surface));
    border:1.5px solid var(--bc); color:var(--text);
    padding:8px 13px; border-radius:11px; box-shadow:0 2px 10px -5px rgba(0,0,0,.3);
    display:flex; gap:8px; align-items:center;}
  .topic .dot{width:8px; height:8px; border-radius:50%; background:var(--bc);}
  .topic .tname{font-weight:600; font-size:13.5px; letter-spacing:-0.01em;}
  .topic .ttag{font-family:"Geist Mono",monospace; font-size:9px; text-transform:uppercase;
    letter-spacing:.06em; font-weight:600; color:var(--bc);}
  .topic .tcount{font-family:"Geist Mono",monospace; font-size:11px; color:var(--text-3);}
  .topic .tcollapsed{font-family:"Geist Mono",monospace; font-size:11px; font-weight:500;
    color:var(--bg); background:var(--bc); padding:1px 7px; border-radius:999px;}
  .topic .timp{font-family:"Geist Mono",monospace; font-size:9px; color:var(--text-2);
    border:1px dashed var(--bc); border-radius:6px; padding:0 5px; letter-spacing:.02em;}

  .leaf{max-width:212px; background:var(--surface); border:1px solid var(--border);
    padding:7px 12px; border-radius:9px; box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer;
    transition:border-color .15s;}
  .leaf:hover{border-color:var(--bc);}
  .leaf.right{border-left:3px solid var(--bc); transform:translate(0,-50%);}
  .leaf.left{border-right:3px solid var(--bc); transform:translate(-100%,-50%); text-align:right;}
  .leaf .t{font-size:12.5px; line-height:1.4; color:var(--text);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .leaf.hasref .t::after{content:"  ↗"; color:var(--bc); font-weight:600;}

  /* ---- Highlight ---- */
  [data-active]:not([data-active="none"]) [data-branch]{opacity:.15;}
  [data-active="0"] [data-branch="0"],
  [data-active="1"] [data-branch="1"],
  [data-active="2"] [data-branch="2"]{opacity:1;}
  [data-branch]{transition:opacity .18s ease;}
  .node.dim{opacity:.1 !important;}
  .node.hit{outline:2px solid var(--bc); outline-offset:1px;}

  /* ---- Painel de leitura ---- */
  .panel{position:fixed; top:0; right:0; height:100%; width:min(440px,94vw); background:var(--surface);
    border-left:1px solid var(--border); box-shadow:-8px 0 30px -12px rgba(0,0,0,.45);
    transform:translateX(100%); transition:transform .22s ease; z-index:50;
    display:flex; flex-direction:column;}
  .panel.open{transform:none;}
  .phead{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
    padding:16px 18px; border-bottom:1px solid var(--border);}
  .pmeta{font-size:12px; color:var(--text-3); line-height:1.5;}
  .pmeta b{color:var(--text-2); font-weight:600;}
  #pclose{border:none; background:transparent; color:var(--text-2); font-size:18px; cursor:pointer;
    border-radius:8px; padding:2px 9px; line-height:1;}
  #pclose:hover{background:var(--surface-2);}
  .pbody{padding:18px; overflow:auto;}
  #ptext{font-size:14px; line-height:1.6; color:var(--text); margin:0 0 14px;}
  .md{font-size:13px; line-height:1.6; color:var(--text-2); max-width:100%;}
  .md > :first-child{margin-top:0;}
  .md h1,.md h2,.md h3,.md h4,.md h5,.md h6{color:var(--text); line-height:1.3; margin:15px 0 7px;}
  .md h1{font-size:18px;} .md h2{font-size:16px;} .md h3{font-size:14.5px;}
  .md h4,.md h5,.md h6{font-size:13px;}
  .md p{margin:8px 0;}
  .md ul,.md ol{margin:8px 0; padding-left:20px;}
  .md li{margin:3px 0;}
  .md a{color:oklch(0.66 0.14 255); text-decoration:none;}
  .md a:hover{text-decoration:underline;}
  [data-theme="light"] .md a{color:oklch(0.5 0.16 255);}
  .md code{font-family:"Geist Mono",monospace; font-size:11.5px; background:var(--mono-bg); padding:1px 5px; border-radius:5px;}
  .md pre.code{background:var(--mono-bg); border:1px solid var(--border); border-radius:10px; padding:12px; overflow-x:auto; max-width:100%; margin:10px 0;}
  .md pre.code code{background:none; padding:0; font-size:11.5px; line-height:1.5;}
  .md blockquote{border-left:3px solid var(--border); margin:8px 0; padding:2px 12px; color:var(--text-3);}
  .md table{border-collapse:collapse; margin:10px 0; font-size:12px; display:block; overflow-x:auto; max-width:100%;}
  .md th,.md td{border:1px solid var(--border); padding:5px 9px; text-align:left;}
  .md th{background:var(--surface-2); color:var(--text); font-weight:600;}
  .md hr{border:none; border-top:1px solid var(--border); margin:12px 0;}
  .md .wl{color:var(--text); border-bottom:1px dashed var(--text-3);}
  .md .mermaid{margin:12px 0; text-align:center;}
  .md .mermaid.fallback{white-space:pre-wrap; word-break:break-word; text-align:left; font-family:"Geist Mono",monospace;
    font-size:11.5px; background:var(--mono-bg); border:1px solid var(--border); border-radius:10px; padding:12px;}
  .pfilelabel{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; font-weight:600;
    color:var(--text-3); margin:0 0 8px;}
  .pfind{position:sticky; top:0; display:flex; align-items:center; gap:8px; padding:8px 0 10px;
    background:var(--surface); z-index:2; margin-bottom:4px;}
  .pfind input{flex:1; font-family:"Geist",sans-serif; font-size:12px; padding:6px 10px;
    border:1px solid var(--border); border-radius:8px; background:var(--surface-2); color:var(--text); outline:none;}
  .pfind input:focus{border-color:var(--text-3);}
  #pfindct{font-size:11px; font-family:"Geist Mono",monospace; color:var(--text-3); min-width:42px; text-align:right;}
  mark.find{background:oklch(0.85 0.16 95); color:#1a1a1a; border-radius:3px; padding:0 1px;}
  mark.find.cur{background:oklch(0.7 0.19 45); color:#fff;}
</style>
</head>
<body>
  <div class="toolbar">
    <div class="wordmark">
      <span class="dot"></span>
      <span class="name">memory</span>
      <span class="sub">mapa mental</span>
      <span class="live" id="live" title="atualiza ao vivo quando os arquivos mudam">ao vivo</span>
    </div>
    <div class="segmented" id="projects"></div>
    <div class="tools">
      <input id="search" type="search" placeholder="buscar… (use * e ?)" autocomplete="off" spellcheck="false">
      <button class="theme-toggle" id="theme">Tema claro</button>
      <div id="results" hidden></div>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="mapwrap">
    <div class="canvas" id="canvas" data-active="none"></div>
  </div>

  <aside class="panel" id="panel" aria-hidden="true">
    <div class="phead">
      <div class="pmeta"><span id="psrc" class="mono"></span><br><b id="ptopic"></b></div>
      <button id="pclose" title="Fechar (Esc)">✕</button>
    </div>
    <div class="pbody">
      <p id="ptext"></p>
      <div class="pfind" id="pfind" hidden>
        <input id="pfindinput" type="search" placeholder="buscar no arquivo… (Enter = próximo)" autocomplete="off" spellcheck="false">
        <span id="pfindct"></span>
      </div>
      <p class="pfilelabel" id="pfilelabel" hidden>conteúdo do arquivo</p>
      <div id="pfile" class="md" hidden></div>
    </div>
  </aside>

<script>
const PROJECTS = __DATA__;
const C = {cx:740, rowH:50, blockGap:24, catDX:220, leafDX:410, W:1480};
const state = {project:0, collapsed:{}, hover:null, theme:'dark', query:''};

const $ = s => document.querySelector(s);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtTok = n => n < 1000 ? `${n}` : `${(n / 1000).toFixed(n < 10000 ? 1 : 0)}k`;  // 1234 -> "1.2k"

function rowsOf(t, key){ return state.collapsed[key] ? 1 : Math.max(t.items.length, 1); }

function layout(){
  const p = PROJECTS[state.project];
  const sources = p.sources;
  const srcInfo = sources.map((s, si) => {
    let rows = 0;
    s.topics.forEach((t, ti) => rows += rowsOf(t, si + ':' + ti));
    return {si, rows};
  });
  // distribuição greedy entre os dois lados
  const order = [...srcInfo].sort((a, b) => b.rows - a.rows);
  let loadL = 0, loadR = 0; const sideOf = {};
  for (const s of order){ if (loadL <= loadR){ sideOf[s.si] = 'L'; loadL += s.rows; } else { sideOf[s.si] = 'R'; loadR += s.rows; } }
  const left  = srcInfo.filter(s => sideOf[s.si] === 'L').sort((a, b) => a.si - b.si);
  const right = srcInfo.filter(s => sideOf[s.si] === 'R').sort((a, b) => a.si - b.si);

  const sideHeight = list => {
    let rows = 0, topics = 0;
    list.forEach(s => sources[s.si].topics.forEach((t, ti) => { rows += rowsOf(t, s.si + ':' + ti); topics++; }));
    return rows * C.rowH + Math.max(0, topics - 1) * C.blockGap;
  };
  const contentH = Math.max(sideHeight(left), sideHeight(right));
  const H = Math.max(620, contentH + 150);
  const cy = H / 2;

  const nodes = [], conns = [];
  const placeSide = (list, sign) => {
    let y = cy - sideHeight(list) / 2;
    list.forEach(s => {
      const source = sources[s.si];
      source.topics.forEach((t, ti) => {
        const key = s.si + ':' + ti;
        const collapsed = !!state.collapsed[key];
        const blockH = rowsOf(t, key) * C.rowH;
        const catX = C.cx + sign * C.catDX, catY = y + blockH / 2;
        nodes.push({type:'topic', b:source.b, x:catX, y:catY, name:t.name, tag:source.tag, count:t.items.length, collapsed, key, imp:t.imp});
        conns.push({b:source.b, x1:C.cx, y1:cy, x2:catX, y2:catY});
        if (!collapsed){
          t.items.forEach((it, j) => {
            const leafX = C.cx + sign * C.leafDX, leafY = y + C.rowH / 2 + j * C.rowH;
            nodes.push({type:'leaf', b:source.b, x:leafX, y:leafY, text:it.text, ref:it.ref,
                        topic:t.name, srcfile:source.file, topickey:key, side: sign > 0 ? 'right' : 'left'});
            conns.push({b:source.b, x1:catX, y1:catY, x2:leafX, y2:leafY});
          });
        }
        y += blockH + C.blockGap;
      });
    });
  };
  placeSide(left, -1); placeSide(right, +1);
  return {H, cy, nodes, conns, p};
}

function bez(c){ const mx = (c.x1 + c.x2) / 2; return `M ${c.x1} ${c.y1} C ${mx} ${c.y1}, ${mx} ${c.y2}, ${c.x2} ${c.y2}`; }

function render(){
  const {H, cy, nodes, conns, p} = layout();
  const cv = $('#canvas');
  cv.style.width = C.W + 'px';
  cv.style.height = H + 'px';

  const total = p.sources.reduce((n, s) => n + s.topics.reduce((m, t) => m + t.items.length, 0), 0);
  const tok = p.sources.reduce((n, s) => n + (s.tokens || 0), 0);

  let svg = `<svg class="conns" width="${C.W}" height="${H}">`;
  conns.forEach(c => svg += `<path class="b${c.b}" data-branch="${c.b}" d="${bez(c)}"></path>`);
  svg += `</svg>`;

  let html = svg;
  html += `<div class="node root" style="left:${C.cx}px;top:${cy}px">
      <span class="dir mono">${esc(p.dir)}</span>
      <span class="pname">${esc(p.name)}</span>
      <span class="psub">${total} memórias · ${p.sources.length} arquivos · ~${fmtTok(tok)} tokens</span>
    </div>`;

  nodes.forEach(n => {
    if (n.type === 'topic'){
      const badge = n.collapsed
        ? `<span class="tcollapsed">+${n.count}</span>`
        : `<span class="tcount mono">${n.count}</span>`;
      html += `<div class="node topic b${n.b}" data-branch="${n.b}" data-key="${esc(n.key)}" style="left:${n.x}px;top:${n.y}px">
          <span class="dot"></span>
          <span class="tname">${esc(n.name)}</span>
          <span class="ttag">${esc(n.tag)}</span>
          ${n.imp ? `<span class="timp" title="importado via @${esc(n.imp)}">↳ ${esc(n.imp.split('/').pop())}</span>` : ''}
          ${badge}
        </div>`;
    } else {
      html += `<div class="node leaf b${n.b} ${n.side}${n.ref ? ' hasref' : ''}" data-branch="${n.b}"
          style="left:${n.x}px;top:${n.y}px" title="${esc(n.text)}"
          data-text="${esc(n.text)}" data-topic="${esc(n.topic)}" data-src="${esc(n.srcfile)}" data-topickey="${esc(n.topickey)}"${n.ref ? ` data-ref="${esc(n.ref)}"` : ''}>
          <span class="t">${esc(n.text)}</span>
        </div>`;
    }
  });
  cv.innerHTML = html;
  applySearch();
}

function renderProjects(){
  $('#projects').innerHTML = PROJECTS.map((p, i) => {
    const total = p.sources.reduce((n, s) => n + s.topics.reduce((m, t) => m + t.items.length, 0), 0);
    return `<button class="${i === state.project ? 'active' : ''}" data-i="${i}">${esc(p.name)}<span class="ct mono">${total}</span></button>`;
  }).join('');
}

function renderLegend(){
  const p = PROJECTS[state.project];
  let h = `<span class="lbl">${p.sources.length} fontes</span>`;
  p.sources.forEach(s => {
    const ct = s.topics.reduce((m, t) => m + t.items.length, 0);
    h += `<div class="chip b${s.b}" data-branch="${s.b}">
        <span class="dot"></span>
        <span class="file mono">${esc(s.file)}</span>
        <span class="role">${esc(s.role)}</span>
        <span class="badge" title="memórias (bullets)">${ct}</span>
        <span class="badge tok" title="tokens estimados que esta fonte injeta na sessão (~chars/4)">~${fmtTok(s.tokens || 0)} tok</span>
      </div>`;
  });
  h += `<span class="hint">clique numa folha pra ler · passe o mouse numa fonte pra destacar · clique num tópico pra recolher</span>`;
  $('#legend').innerHTML = h;
}

function setActive(b){ $('#canvas').dataset.active = (b == null ? 'none' : b); }

// normaliza p/ busca: minúsculas + remove diacríticos (renovacao casa "renovação") — PT-friendly.
const norm = s => s.toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu, '');

// busca do mapa: substring por padrão; '*' (qualquer trecho) e '?' (1 caractere) viram glob
// não-ancorado, casando em qualquer posição — ex.: auth*token acha "auth…token" no meio do texto.
function globTester(q){
  if (!/[*?]/.test(q)) return s => s.includes(q);
  const body = q.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*').replace(/\?/g, '.');
  try { const re = new RegExp(body); return s => re.test(s); }
  catch { return s => s.includes(q); }   // regex inválida -> cai pra substring
}

function applySearch(){
  const q = norm(state.query.trim());
  const cv = $('#canvas');
  cv.querySelectorAll('.dim, .hit').forEach(e => e.classList.remove('dim', 'hit'));
  if (!q){ updateResults(); return; }
  const test = globTester(q);
  const hitKeys = new Set();
  cv.querySelectorAll('.leaf').forEach(l => {
    if (test(norm(l.dataset.text)) || test(norm(l.dataset.topic))){
      l.classList.add('hit'); hitKeys.add(l.dataset.topickey);
    }
    else l.classList.add('dim');
  });
  cv.querySelectorAll('.topic').forEach(t => {
    const name = norm(t.querySelector('.tname').textContent);
    if (test(name) || hitKeys.has(t.dataset.key)) t.classList.add('hit');
    else t.classList.add('dim');
  });
  updateResults();
}

// lista de resultados clicável (abaixo da busca): cada folha "hit" vira um item que reabre o painel.
// teclado: ↑/↓ movem `resultSel`, Enter abre o selecionado (ver keydown do #search).
let resultSel = -1;
function updateResults(){
  const box = $('#results');
  resultSel = -1;
  if (!state.query.trim()){ box.hidden = true; box.innerHTML = ''; return; }
  const hits = [...$('#canvas').querySelectorAll('.leaf.hit')];
  box.innerHTML = hits.length
    ? `<div class="rhead">${hits.length} resultado${hits.length > 1 ? 's' : ''}</div>`
    : '<div class="rhead">nenhum resultado</div>';
  hits.forEach(l => {
    const it = document.createElement('div');
    it.className = 'result b' + l.dataset.branch;
    it.innerHTML = `<span class="dot"></span><span class="rtext">${esc(l.dataset.text.slice(0, 100))}<div class="rtopic">${esc(l.dataset.topic)}</div></span>`;
    it.addEventListener('click', () => openPanel(l));
    box.appendChild(it);
  });
  box.hidden = false;
}

// busca no CONTEÚDO dos arquivos referenciados (server-side): acende nós cujo arquivo casa,
// somando ao filtro do índice. Debounced no input pra não consultar a cada tecla.
async function contentSearch(){
  const q = state.query.trim();
  if (!q) return;
  try {
    const r = await fetch(`/search?p=${state.project}&q=${encodeURIComponent(q)}`, {cache: 'no-store'});
    if (!r.ok || state.query.trim() !== q) return;        // query mudou -> resposta obsoleta
    const refs = new Set(await r.json());
    if (state.query.trim() !== q || !refs.size) return;
    const cv = $('#canvas'), keys = new Set();
    cv.querySelectorAll('.leaf').forEach(l => {
      if (l.dataset.ref && refs.has(l.dataset.ref)){
        l.classList.add('hit'); l.classList.remove('dim');
        keys.add(l.dataset.topickey);
      }
    });
    cv.querySelectorAll('.topic').forEach(t => {
      if (keys.has(t.dataset.key)){ t.classList.add('hit'); t.classList.remove('dim'); }
    });
    updateResults();
  } catch (e) {}
}

// auto-atualização: poll do /data; só re-renderiza quando o conteúdo muda no servidor
let lastData = null;
function flashLive(){ const l = $('#live'); if (!l) return; l.classList.add('on'); setTimeout(() => l.classList.remove('on'), 1200); }
async function poll(){
  try{
    const r = await fetch('/data', {cache: 'no-store'}); if (!r.ok) return;
    const txt = await r.text();
    if (lastData === null){ lastData = txt; return; }   // adota baseline (= dados injetados)
    if (txt === lastData) return;
    lastData = txt;
    const data = JSON.parse(txt);
    PROJECTS.length = 0; data.forEach(p => PROJECTS.push(p));
    if (state.project >= PROJECTS.length) state.project = 0;
    renderProjects(); renderLegend(); render();
    flashLive();
  } catch (e) { /* servidor fora / arquivo estático: ignora */ }
}

// ---- Markdown -> HTML (mínimo, zero-dep) ----
function inlineMd(s){
  s = esc(s);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, (_, c) => { codes.push(c); return '␀' + (codes.length - 1) + '␀'; });
  s = s.replace(/\[\[([^\]]+)\]\]/g, '<span class="wl">$1</span>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  s = s.replace(/␀(\d+)␀/g, (_, i) => '<code>' + esc(codes[+i]) + '</code>');
  return s;
}
function mdToHtml(src){
  const lines = src.replace(/\r\n/g, '\n').split('\n');
  let html = '', i = 0;
  while (i < lines.length){
    const line = lines[i];
    const fence = line.match(/^```(\w*)/);
    if (fence){
      const lang = fence[1], buf = [];
      i++;
      while (i < lines.length && !lines[i].startsWith('```')){ buf.push(lines[i]); i++; }
      i++;
      const code = buf.join('\n');
      html += lang === 'mermaid'
        ? `<div class="mermaid">${esc(code)}</div>`
        : `<pre class="code"><code>${esc(code)}</code></pre>`;
      continue;
    }
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h){ const n = h[1].length; html += `<h${n}>${inlineMd(h[2])}</h${n}>`; i++; continue; }
    if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ html += '<hr>'; i++; continue; }
    if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(lines[i + 1])){
      const row = r => r.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
      const head = row(line); i += 2;
      let t = '<table><thead><tr>' + head.map(c => `<th>${inlineMd(c)}</th>`).join('') + '</tr></thead><tbody>';
      while (i < lines.length && lines[i].includes('|') && lines[i].trim()){
        t += '<tr>' + row(lines[i]).map(c => `<td>${inlineMd(c)}</td>`).join('') + '</tr>'; i++;
      }
      html += t + '</tbody></table>'; continue;
    }
    if (/^\s*>\s?/.test(line)){
      const buf = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
      html += `<blockquote>${mdToHtml(buf.join('\n'))}</blockquote>`; continue;
    }
    if (/^\s*([-*+]|\d+\.)\s+/.test(line)){
      const ordered = /^\s*\d+\.\s+/.test(line), tag = ordered ? 'ol' : 'ul';
      let l = `<${tag}>`;
      while (i < lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])){
        l += `<li>${inlineMd(lines[i].replace(/^\s*([-*+]|\d+\.)\s+/, ''))}</li>`; i++;
      }
      html += l + `</${tag}>`; continue;
    }
    if (!line.trim()){ i++; continue; }
    const buf = [line]; i++;
    while (i < lines.length && lines[i].trim()
        && !/^(#{1,6}\s|```|\s*>|\s*([-*+]|\d+\.)\s)/.test(lines[i])
        && !/^\s*([-*_])(\s*\1){2,}\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
    html += `<p>${inlineMd(buf.join(' '))}</p>`;
  }
  return html;
}

// ---- Mermaid sob demanda (CDN só quando há diagrama; fallback p/ bloco de código) ----
let mermaidLoading = null;
function ensureMermaid(){
  if (window.mermaid) return Promise.resolve(window.mermaid);
  if (!mermaidLoading){
    mermaidLoading = new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
      s.onload = () => res(window.mermaid); s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  return mermaidLoading;
}
function renderMermaid(container){
  const blocks = container.querySelectorAll('.mermaid');
  if (!blocks.length) return;
  ensureMermaid().then(m => {
    m.initialize({ startOnLoad: false, theme: state.theme === 'dark' ? 'dark' : 'default', securityLevel: 'strict' });
    m.run({ nodes: blocks });
  }).catch(() => blocks.forEach(b => b.classList.add('fallback')));
}

// ---- Busca dentro do arquivo aberto (highlight + navegação) ----
function clearFind(box){
  box.querySelectorAll('mark.find').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  box.normalize();
}
function highlightFind(box, q){
  clearFind(box);
  // destaca os PEDAÇOS literais do termo (curinga vira separador) e ignora acento, casando a busca
  // do mapa: "tcm*depl" -> marca "tcm" e "depl"; "renovacao" -> marca "renovação". norm() preserva
  // o comprimento em texto precomposto, então os offsets do <mark> batem no texto original.
  const tokens = [...new Set(norm(q).split(/[*?]+/).filter(t => t.length >= 2))];
  if (!tokens.length) return 0;
  const walker = document.createTreeWalker(box, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      if (!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      for (let p = n.parentNode; p && p !== box; p = p.parentNode){
        if (p.tagName && p.tagName.toLowerCase() === 'svg') return NodeFilter.FILTER_REJECT;  // não mexe no mermaid
      }
      const c = norm(n.nodeValue);
      return tokens.some(t => c.includes(t)) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const targets = [];
  while (walker.nextNode()) targets.push(walker.currentNode);
  let count = 0;
  targets.forEach(node => {
    const text = node.nodeValue, cmp = norm(text);
    let ranges = [];
    tokens.forEach(t => {
      let idx = 0, m;
      while ((m = cmp.indexOf(t, idx)) !== -1){ ranges.push([m, m + t.length]); idx = m + t.length; }
    });
    if (!ranges.length) return;
    ranges.sort((a, b) => a[0] - b[0]);                 // mescla intervalos sobrepostos/adjacentes
    const merged = [ranges[0].slice()];
    for (let k = 1; k < ranges.length; k++){
      const last = merged[merged.length - 1];
      if (ranges[k][0] <= last[1]) last[1] = Math.max(last[1], ranges[k][1]);
      else merged.push(ranges[k].slice());
    }
    const frag = document.createDocumentFragment();
    let pos = 0;
    merged.forEach(([s, e]) => {
      if (s > pos) frag.appendChild(document.createTextNode(text.slice(pos, s)));
      const mark = document.createElement('mark');
      mark.className = 'find'; mark.textContent = text.slice(s, e);
      frag.appendChild(mark); count++;
      pos = e;
    });
    if (pos < text.length) frag.appendChild(document.createTextNode(text.slice(pos)));
    node.parentNode.replaceChild(frag, node);
  });
  return count;
}
let findMarks = [], findIdx = 0;
function runFind(q){
  const box = $('#pfile');
  const n = highlightFind(box, q.trim());
  findMarks = Array.from(box.querySelectorAll('mark.find'));
  findIdx = 0;
  $('#pfindct').textContent = q.trim() ? (n ? `1/${n}` : '0') : '';
  if (findMarks.length) setCur(0);
}
function setCur(i){
  if (!findMarks.length) return;
  findMarks.forEach(m => m.classList.remove('cur'));
  findIdx = (i + findMarks.length) % findMarks.length;
  const m = findMarks[findIdx];
  m.classList.add('cur');
  m.scrollIntoView({block: 'center', behavior: 'smooth'});
  $('#pfindct').textContent = `${findIdx + 1}/${findMarks.length}`;
}

function openPanel(el){
  $('#psrc').textContent = el.dataset.src;
  $('#ptopic').textContent = el.dataset.topic;
  $('#ptext').textContent = el.dataset.text;
  const box = $('#pfile'), lbl = $('#pfilelabel'), pfind = $('#pfind'), ref = el.dataset.ref;
  if (ref){
    box.hidden = false; lbl.hidden = false; pfind.hidden = false; box.textContent = 'carregando…';
    fetch('/file?p=' + encodeURIComponent(ref))
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(t => {
        box.innerHTML = mdToHtml(t); renderMermaid(box);
        const pre = state.query.trim();            // pré-preenche com a busca do mapa, se houver
        $('#pfindinput').value = pre; runFind(pre);
      })
      .catch(() => { box.textContent = '(não foi possível ler o arquivo — disponível só rodando via serve.py)'; $('#pfindct').textContent = ''; });
  } else {
    box.hidden = true; lbl.hidden = true; pfind.hidden = true;
    $('#pfindinput').value = ''; $('#pfindct').textContent = '';
  }
  $('#panel').classList.add('open');
  $('#panel').setAttribute('aria-hidden', 'false');
}
function closePanel(){
  $('#panel').classList.remove('open');
  $('#panel').setAttribute('aria-hidden', 'true');
}

function init(){
  document.documentElement.dataset.theme = state.theme;
  renderProjects(); renderLegend(); render();

  $('#projects').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    state.project = +b.dataset.i; state.hover = null; state.collapsed = {};
    renderProjects(); renderLegend(); render(); setActive(null); closePanel();
  });

  $('#theme').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = state.theme;
    $('#theme').textContent = state.theme === 'dark' ? 'Tema claro' : 'Tema escuro';
  });

  const mapwrap = document.querySelector('.mapwrap');
  mapwrap.addEventListener('mouseover', e => {
    const t = e.target.closest('[data-branch]');
    setActive(t ? t.dataset.branch : null);
  });
  mapwrap.addEventListener('mouseleave', () => setActive(null));
  $('#legend').addEventListener('mouseover', e => {
    const t = e.target.closest('[data-branch]'); if (t) setActive(t.dataset.branch);
  });
  $('#legend').addEventListener('mouseleave', () => setActive(null));

  $('#canvas').addEventListener('click', e => {
    const leaf = e.target.closest('.leaf');
    if (leaf){ openPanel(leaf); return; }
    const topic = e.target.closest('.topic');
    if (topic){ const k = topic.dataset.key; state.collapsed[k] = !state.collapsed[k]; render(); }
  });

  $('#pclose').addEventListener('click', closePanel);
  const search = $('#search');
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape'){ closePanel(); return; }
    // "/" ou Cmd/Ctrl+K foca a busca — exceto se já está digitando num campo
    const typing = /^(input|textarea)$/i.test(document.activeElement && document.activeElement.tagName);
    if (!typing && (e.key === '/' || ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'))){
      e.preventDefault(); search.focus(); search.select();
    }
  });

  let searchTimer = null;
  search.addEventListener('input', () => {
    state.query = search.value; applySearch();                       // índice (instantâneo)
    clearTimeout(searchTimer);
    if (state.query.trim()) searchTimer = setTimeout(contentSearch, 200);  // conteúdo (server)
  });
  search.addEventListener('keydown', e => {                          // ↑/↓ navega a lista, Enter abre, Esc limpa
    const items = [...$('#results').querySelectorAll('.result')];
    if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && items.length){
      e.preventDefault();
      const dir = e.key === 'ArrowDown' ? 1 : -1;
      resultSel = resultSel < 0 ? (dir === 1 ? 0 : items.length - 1)
                                : Math.max(0, Math.min(resultSel + dir, items.length - 1));
      items.forEach((it, i) => it.classList.toggle('sel', i === resultSel));
      items[resultSel].scrollIntoView({block: 'nearest'});
    } else if (e.key === 'Enter' && items.length){
      e.preventDefault();
      (items[resultSel] || items[0]).click();
    } else if (e.key === 'Escape' && search.value){
      search.value = ''; state.query = ''; applySearch();
      e.stopPropagation();                                           // não deixa o Esc global fechar o painel
    }
  });
  setInterval(poll, 5000);

  const pfi = $('#pfindinput');
  pfi.addEventListener('input', () => runFind(pfi.value));
  pfi.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); setCur(findIdx + (e.shiftKey ? -1 : 1)); }
  });
}
init();
</script>
</body>
